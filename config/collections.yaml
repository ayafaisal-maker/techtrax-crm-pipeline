    watermark_field: updatedAt
    has_tenant_filter: true
    has_soft_delete: true

  crmleavetypes:
    load_type: full
    has_tenant_filter: true
    has_soft_delete: true

  crmuserleavebalances:
    load_type: full
    has_tenant_filter: true
    has_soft_delete: true

  # ---------- Google Sheets integration ----------
  googlesheetsconfigs:
    load_type: full
    has_tenant_filter: true
