    load_type: full
    has_tenant_filter: true
    has_soft_delete: true

  leadnotes:
    load_type: incremental
    watermark_field: updatedAt
    has_tenant_filter: true
    has_soft_delete: false   # uses isArchived instead

  # ---------- CRM config / lookups ----------
  crmconfigs:
    load_type: full
    has_tenant_filter: true
    has_soft_delete: false

  crmreferencedatas:
    load_type: full
    has_tenant_filter: true
    has_soft_delete: true

