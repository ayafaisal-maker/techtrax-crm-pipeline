collections:

  # ---------- Core CRM entities ----------
  tenants:
    load_type: full
    has_tenant_filter: false   # tenants IS the tenant
    has_soft_delete: true

  users:
    load_type: incremental
    watermark_field: updatedAt
    has_tenant_filter: true
    has_soft_delete: true

  roles:
    load_type: full
    has_tenant_filter: true
    has_soft_delete: true

  teams:
    load_type: full
    has_tenant_filter: true
    has_soft_delete: true

  customerprofiles:
    load_type: incremental
    watermark_field: updatedAt
    has_tenant_filter: true
    has_soft_delete: true

  customfields:
    load_type: full
    has_tenant_filter: true
    has_soft_delete: true

  fileassets:
    load_type: incremental
    watermark_field: updatedAt
    has_tenant_filter: true
    has_soft_delete: true

  notifications:
    load_type: incremental
    watermark_field: updatedAt
    has_tenant_filter: true
    has_soft_delete: true

  # ---------- Audit / history (append-only, no soft delete) ----------
  auditlogs:
    load_type: incremental
    watermark_field: timestamp
    has_tenant_filter: true
    has_soft_delete: false
    note: "Large collection (~186K docs). Watch load time."

  permissionauditlogs:
    load_type: incremental
    watermark_field: timestamp
    has_tenant_filter: true
    has_soft_delete: false

  crmauditlogs:
    load_type: incremental
